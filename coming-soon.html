<!doctype html>
  <html lang="en">>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex,nofollow">
    
    <style>
      /* Extra safety: ensure the page fills the viewport nicely */
      .proto-coming-soon-wrap{
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .proto-coming-soon-main{
        flex: 1;
      }
      .proto-coming-soon-center{
        max-width: 980px;
        margin: 0 auto;
        padding: 0 22px;
      }
      .proto-coming-soon-panel{
        margin-top: 34px;
      }
      .proto-coming-soon-panel .proto-card{
        box-shadow: var(--proto-soft);
      }
      .proto-coming-soon-fine{
        color: rgba(11,18,32,0.72);
        font-size: 0.98rem;
      }
      .proto-coming-soon-actions{
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 18px;
      }
      @media (max-width: 781px){
        .proto-coming-soon-panel{ margin-top: 22px; }
      }
    </style>
  <meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/site.css">
</head>
  <body>>
    <div class="proto-coming-soon-wrap">
      <main class="proto-coming-soon-main">
        <div class="proto-hero alignfull" style="padding-top:110px;padding-bottom:90px">
          <div class="proto-shape proto-shape--a"></div>
          <div class="proto-shape proto-shape--b"></div>
          <div class="proto-shape proto-shape--c"></div>

          <div class="proto-hero__inner proto-coming-soon-center">
            <p class="proto-badge"><span class="proto-dot" aria-hidden="true"></span>PROTO Robotics</p>
            <h1 style="margin-top:14px">A brilliant idea, coming soon.</h1>
            <p class="proto-lede" style="margin-top:14px">
              We are putting the finishing touches on photos and polishing the launch experience.
              The full site will be live soon.
            </p>

            <div class="proto-coming-soon-actions">
              <a class="wp-block-button__link has-proto-red-background-color has-text-color has-background wp-element-button"
                 style="border-radius:999px; padding:0.85rem 1.2rem; display:inline-flex; align-items:center; gap:10px;"
                 href="mailto:hello@protorobotics.org">
                Contact us
              </a>

              <a class="wp-block-button__link wp-element-button"
                 style="border-radius:999px; padding:0.85rem 1.2rem; display:inline-flex; align-items:center; gap:10px; background: rgba(255,255,255,0.70); border: 1px solid rgba(11,18,32,0.12); color: rgba(11,18,32,0.86); text-decoration:none;"
                 href="contact.html">
                Admin login
              </a>
            </div>

            <div class="proto-coming-soon-panel">
              <div class="proto-card" style="padding:18px 18px">
                <p class="proto-coming-soon-fine" style="margin:0">
                  Want a quick preview? If you are an admin, log in and you will see the full site as usual.
                </p>
              </div>
            </div>

          </div>
        </div>
      </main>
    </div>
    
  <script src="assets/js/motion.js" defer></script>
</body>
  </html>
